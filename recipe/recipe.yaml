# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: 3.2.1
  python_check_max: "3.13"
  selenium_min: 4.26.0
  selenium_max_exclusive: 5.0.0

package:
  name: appium-python-client
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/appium-python-client/Appium-Python-Client-${{ version }}.tar.gz
  sha256: f48be85e66aa887fa5e1583785ecff4671dc5ce3dde54a5d550d816a87c9d635

build:
  number: 1
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - selenium >=${{ selenium_min }},<${{ selenium_max_exclusive }}

tests:
  - python:
      imports:
        - appium
        - appium.common
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - mypy
    script:
      - mypy -p appium

about:
  summary: Python client for Appium
  license: Apache-2.0
  license_file: LICENSE
  homepage: http://appium.io
  repository: https://github.com/appium/python-client
  documentation: https://appium.io/docs/en/latest/quickstart/test-py

extra:
  recipe-maintainers:
    - nisharai1
    - saibhargav1508
    - bollwyvl
